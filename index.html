<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>🔥 Slide AO VIVO</title>

  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      display: inline-block;
      margin: 10px;
      padding: 20px;
      border-radius: 10px;
      background: #1c2333;
      font-size: 20px;
      font-weight: bold;
    }

    .green { color: #34d399; }
    .red { color: #f87171; }
  </style>
</head>

<body>

<h2>🔥 Slide AO VIVO</h2>
<div id="status">Carregando...</div>
<div id="resultados"></div>

<script>
async function carregar() {
  try {
    const res = await fetch("/api/slide");
    const data = await res.json();

    document.getElementById("status").innerText = "Conectado";

    let html = "";

    data.slice(0, 10).forEach(item => {
      let valor = item.crash_point;
      let cor = valor >= 2 ? "green" : "red";

      html += `<div class="box ${cor}">${valor}x</div>`;
    });

    document.getElementById("resultados").innerHTML = html;

  } catch (e) {
    document.getElementById("status").innerText = "Erro ao carregar";
  }
}

setInterval(carregar, 3000);
carregar();
</script>

</body>
</html>
