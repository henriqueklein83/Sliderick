<!DOCTYPE html>
<html>
<head>
  <title>Slide AO VIVO 🔥</title>
</head>
<body style="background:#0b0f1a;color:white;text-align:center;font-family:Arial;">

<h2>🔥 Slide AO VIVO</h2>
<div id="status">Carregando...</div>
<div id="result"></div>

<script>
async function getSlide() {
  try {
    const res = await fetch("https://blaze.bet.br/api/singleplayer-originals/originals/slide_games/recent/history/1");
    const data = await res.json();

    const crash = data[0].crash_point;

    document.getElementById("status").innerText = "AO VIVO";
    document.getElementById("result").innerHTML =
      "<h1>" + crash + "x</h1>";

  } catch (e) {
    document.getElementById("status").innerText = "Erro ao carregar";
  }
}

setInterval(getSlide, 2000);
getSlide();
</script>

</body>
</html>
