<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide Miner PROXY</title>
<style>
body{background:#0b1020;color:#fff;font-family:Arial;padding:15px}
.box{background:#18223d;padding:12px;margin:5px;border-radius:10px}
.green{color:#34d399}
.red{color:#f87171}
</style>
</head>
<body>

<h2>🔥 Slide Miner (Proxy)</h2>
<div id="status">Conectando...</div>
<div id="results"></div>

<script>
const proxy = "https://api.allorigins.win/raw?url=";
const url = "https://blaze.bet.br/api/singleplayer-originals/originals/slide_games/recent/history/1";

async function fetchData(){
  try{
    const res = await fetch(proxy + encodeURIComponent(url));
    const data = await res.json();

    document.getElementById("status").innerText = "🟢 AO VIVO";

    const container = document.getElementById("results");
    container.innerHTML = "";

    data.slice(0,20).forEach(r=>{
      const d = new Date(r.created_at);
      const cor = r.crash_point >= 10 ? "green" : "red";

      container.innerHTML += `
        <div class="box">
          <div class="${cor}">${Number(r.crash_point).toFixed(2)}x</div>
          <div>${d.toLocaleTimeString('pt-BR')}</div>
        </div>
      `;
    });

  }catch(e){
    document.getElementById("status").innerText = "Erro ainda...";
  }
}

setInterval(fetchData,3000);
fetchData();
</script>

</body>
</html>
