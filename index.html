<!DOCTYPE html>
<html>
<head>
  <title>Slide AO VIVO 🔥</title>
  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    .box {
      display: inline-block;
      margin: 10px;
      padding: 20px;
      border-radius: 10px;
      background: #1c2333;
      font-size: 22px;
    }
  </style>
</head>
<body>

<h1>🔥 Slide AO VIVO</h1>

<div id="results"></div>

<script>
async function load() {
  try {
    const res = await fetch("https://blaze.bet.br/api/singleplayer-originals/originals/slide_games/recent/history/1");
    const data = await res.json();

    let html = "";
    data.records.slice(0, 10).forEach(r => {
      html += `<div class="box">${r.multiplier}x</div>`;
    });

    document.getElementById("results").innerHTML = html;
  } catch {
    document.getElementById("results").innerHTML = "Erro ao carregar";
  }
}

setInterval(load, 3000);
load();
</script>

</body>
</html>
